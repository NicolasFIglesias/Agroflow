services:
  - type: web
    name: agriflow-api
    env: node
    rootDir: Site/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://agriflow.netlify.app
