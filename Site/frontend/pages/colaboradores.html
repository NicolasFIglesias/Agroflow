<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components/sidebar.css">

</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🌿</div>
    <div>
      <div class="sidebar-logo-text">AgriFlow</div>
      <div class="sidebar-logo-sub">Crédito Rural</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Principal</div>
    <a href="/pages/visao-geral.html" class="sidebar-item sidebar-item-admin" data-page="visao-geral" style="display:none">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/>
        <rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/>
        <rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/>
        <rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/>
      </svg>
      Visão Geral
    </a>
    <a href="/pages/clientes.html" class="sidebar-item" data-page="clientes">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/>
        <circle cx="9" cy="7" r="4" stroke-width="2"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Clientes
    </a>
    <a href="/pages/imoveis.html" class="sidebar-item" data-page="imoveis">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M3 9.5L12 4l9 5.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 21V12h6v9" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Imóveis
    </a>
    <a href="/pages/calendario.html" class="sidebar-item" data-page="calendario">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/>
        <line x1="16" y1="2" x2="16" y2="6" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="2" x2="8" y2="6" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="10" x2="21" y2="10" stroke-width="2"/>
      </svg>
      Calendário
    </a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label sidebar-item-admin" style="display:none">Administração</div>
    <a href="/pages/colaboradores.html" class="sidebar-item sidebar-item-admin" data-page="colaboradores" style="display:none">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/>
        <circle cx="9" cy="7" r="4" stroke-width="2"/>
        <line x1="19" y1="8" x2="19" y2="14" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="11" x2="16" y2="11" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Colaboradores
    </a>
  </nav>

  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebar-avatar">?</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name" id="sidebar-user-name">—</div>
      <div class="sidebar-user-role" id="sidebar-user-role">—</div>
    </div>
  </div>
  <button class="sidebar-logout-btn" id="btn-logout">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M17 16l4-4m0 0l-4-4m4 4H7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3 12V5a2 2 0 012-2h7" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Sair da conta
  </button>
</aside>

<main class="app-main">
  <div class="app-content">

    <!-- Header -->
    <div class="col-header">
      <div>
        <h1>Colaboradores</h1>
        <p>Gerencie a equipe do escritório</p>
      </div>
      <button class="btn btn-primary btn-lg" id="btn-gerar-convite">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/>
          <circle cx="9" cy="7" r="4" stroke-width="2"/>
          <line x1="19" y1="8" x2="19" y2="14" stroke-width="2" stroke-linecap="round"/>
          <line x1="22" y1="11" x2="16" y2="11" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Convidar novo colaborador
      </button>
    </div>

    <!-- Caixa de convite -->
    <div class="col-invite-box" id="col-invite-box" style="display:none">
      <div class="col-invite-header">
        <span>🔗 Link de convite gerado — expira em 7 dias</span>
        <button id="col-invite-close" style="opacity:.6;cursor:pointer;font-size:1rem">✕</button>
      </div>
      <div class="col-invite-link-row">
        <input type="text" class="col-invite-input" id="col-invite-link" readonly>
        <button class="btn btn-secondary" id="btn-copiar-convite">Copiar</button>
      </div>
    </div>

    <!-- Lista de colaboradores -->
    <div class="col-lista card" id="col-lista">
      <div class="loading-state"><span class="spinner"></span> Carregando...</div>
    </div>

  </div>
</main>

<!-- Modal editar cargo -->
<div class="modal-overlay" id="modal-editar-overlay">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h2>Editar colaborador</h2>
      <button class="btn-close" id="btn-fechar-editar">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editar-id">
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input type="text" id="editar-nome" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Cargo</label>
        <input type="text" id="editar-cargo" class="form-input" placeholder="Ex: Engenheiro Agrônomo">
      </div>
      <div class="form-group">
        <label class="form-label">Nível de acesso</label>
        <select id="editar-role" class="form-select">
          <option value="colaborador">Colaborador</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-cancelar-editar">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-editar">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/pages/colaboradores.js"></script>
</body>
</html>
