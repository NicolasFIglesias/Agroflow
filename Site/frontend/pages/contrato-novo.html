<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
  <title>Novo Contrato — AgriFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components/sidebar.css">
  <link rel="stylesheet" href="../css/contratos.css">
</head>
<body>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🌿</div>
    <div><div class="sidebar-logo-text">AgriFlow</div><div class="sidebar-logo-sub">Crédito Rural</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Principal</div>
    <a href="/pages/visao-geral.html" class="sidebar-item sidebar-item-admin" data-page="visao-geral" style="display:none">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/></svg>
      Visão Geral
    </a>
    <a href="/pages/clientes.html" class="sidebar-item" data-page="clientes">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke-width="2"/></svg>
      Clientes
    </a>
    <a href="/pages/contratos.html" class="sidebar-item" data-page="contratos">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke-width="2" stroke-linecap="round"/></svg>
      Contratos
    </a>
    <a href="/pages/calendario.html" class="sidebar-item" data-page="calendario">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-width="2"/></svg>
      Calendário
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebar-avatar">?</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name" id="sidebar-user-name">—</div>
      <div class="sidebar-user-role" id="sidebar-user-role">—</div>
    </div>
  </div>
  <button class="sidebar-logout-btn" id="btn-logout">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 12V5a2 2 0 012-2h7" stroke-width="2" stroke-linecap="round"/></svg>
    Sair da conta
  </button>
</aside>

<main class="app-main">
  <div class="app-content">

    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <a href="/pages/contratos.html" style="font-size:.82rem;font-weight:600;color:var(--md-primary);text-decoration:none">← Contratos</a>
        <h1 id="ct-wizard-titulo" style="margin-top:8px">Novo contrato</h1>
      </div>
      <div class="ct-rascunho-indicator" id="ct-rascunho-info" style="display:none">
        <div class="ct-rascunho-dot"></div>
        <span id="ct-rascunho-texto">Rascunho salvo</span>
      </div>
    </div>

    <div class="ct-steps" id="ct-steps"></div>
    <div id="ct-wizard-content"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;max-width:760px" id="ct-nav">
      <button class="btn btn-secondary" id="btn-ct-voltar" style="display:none">← Voltar</button>
      <div style="flex:1"></div>
      <button class="btn btn-primary" id="btn-ct-avancar">Avançar →</button>
    </div>

  </div>
</main>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/pages/contrato-novo.js"></script>
</body>
</html>
