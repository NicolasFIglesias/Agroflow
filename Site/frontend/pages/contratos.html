<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
  <title>Contratos — AgriFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components/sidebar.css">
  <link rel="stylesheet" href="../css/contratos.css">
</head>
<body>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🌿</div>
    <div><div class="sidebar-logo-text">AgriFlow</div><div class="sidebar-logo-sub">Crédito Rural</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Principal</div>
    <a href="/pages/visao-geral.html" class="sidebar-item sidebar-item-admin" data-page="visao-geral" style="display:none">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/></svg>
      Visão Geral
    </a>
    <a href="/pages/clientes.html" class="sidebar-item" data-page="clientes">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke-width="2"/></svg>
      Clientes
    </a>
    <a href="/pages/imoveis.html" class="sidebar-item" data-page="imoveis">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9.5L12 4l9 5.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke-width="2" stroke-linecap="round"/></svg>
      Imóveis
    </a>
    <a href="/pages/contratos.html" class="sidebar-item active" data-page="contratos">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="13" x2="8" y2="13" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="17" x2="8" y2="17" stroke-width="2" stroke-linecap="round"/></svg>
      Contratos
    </a>
    <a href="/pages/calendario.html" class="sidebar-item" data-page="calendario">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-width="2"/></svg>
      Calendário
    </a>
    <div class="sidebar-divider"></div>
    <a href="/pages/modelos-documentos.html" class="sidebar-item" data-page="modelos-documentos">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 22h14a2 2 0 002-2V7.5L14.5 2H6a2 2 0 00-2 2v4" stroke-width="2" stroke-linecap="round"/><polyline points="14 2 14 8 20 8" stroke-width="2"/><path d="M2 15h10M2 19h6" stroke-width="2" stroke-linecap="round"/></svg>
      Modelos
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebar-avatar">?</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name" id="sidebar-user-name">—</div>
      <div class="sidebar-user-role" id="sidebar-user-role">—</div>
    </div>
  </div>
  <button class="sidebar-logout-btn" id="btn-logout">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 12V5a2 2 0 012-2h7" stroke-width="2" stroke-linecap="round"/></svg>
    Sair da conta
  </button>
</aside>

<main class="app-main">
  <div class="app-content">

    <!-- Abas -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div style="display:flex;gap:0;border-bottom:2px solid var(--md-outline-variant)">
        <button class="ficha-tab active" data-ct-tab="contratos" style="font-size:.875rem;padding:8px 18px">📄 Contratos</button>
        <button class="ficha-tab" data-ct-tab="modelos" style="font-size:.875rem;padding:8px 18px">📋 Modelos</button>
      </div>
      <div id="ct-aba-btns">
        <a href="/pages/contrato-novo.html" class="btn btn-primary btn-lg">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke-width="2" stroke-linecap="round"/></svg>
          Novo contrato
        </a>
      </div>
    </div>

    <!-- Aba Contratos -->
    <div id="ct-panel-contratos">

    <div class="ct-filtros">
      <div class="ct-busca">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="ct-busca-icon"><circle cx="11" cy="11" r="8" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" id="ct-busca" class="ct-busca-input" placeholder="Buscar por nome, número, tipo...">
      </div>
      <select id="ct-filtro-tipo" class="ct-filtro-select">
        <option value="">Todos os tipos</option>
        <option value="arrendamento">Arrendamento</option>
        <option value="compra_venda">Compra e Venda</option>
        <option value="comodato">Comodato</option>
        <option value="permuta">Permuta</option>
        <option value="aluguel">Aluguel</option>
        <option value="recibo">Recibo</option>
        <option value="nota_promissoria">Nota Promissória</option>
      </select>
      <select id="ct-filtro-status" class="ct-filtro-select">
        <option value="">Todos os status</option>
        <option value="ativo">Ativo</option>
        <option value="rascunho">Rascunho</option>
        <option value="vencido">Vencido</option>
        <option value="encerrado">Encerrado</option>
      </select>
    </div>

    <div class="ct-lista-wrap">
      <div class="ct-lista-header">
        <span>Número</span>
        <span>Tipo / Partes</span>
        <span>Imóvel</span>
        <span>Data</span>
        <span>Status</span>
        <span></span>
      </div>
      <div id="ct-lista"><div class="ct-loading">Carregando...</div></div>
    </div>

    <div class="ct-paginacao" id="ct-paginacao" style="display:none">
      <button class="btn btn-secondary btn-sm" id="btn-ct-ant">← Anterior</button>
      <span id="ct-pag-info" class="ct-pag-info"></span>
      <button class="btn btn-secondary btn-sm" id="btn-ct-prox">Próxima →</button>
    </div>
    </div><!-- /ct-panel-contratos -->

    <!-- Aba Modelos -->
    <div id="ct-panel-modelos" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <p style="font-size:.875rem;color:var(--md-on-surface-variant)">Faça upload de templates .docx com tags <code style="background:var(--md-surface-container);padding:2px 6px;border-radius:4px">{{TAG}}</code> para gerar contratos automaticamente.</p>
        <button class="btn btn-primary" id="btn-upload-modelo">+ Upload modelo</button>
      </div>
      <div id="md-lista-contratos"><div class="ct-loading">Carregando...</div></div>
    </div>

    <!-- Modal upload modelo -->
    <div class="modal-overlay" id="modal-upload-ct">
      <div class="modal-box" style="max-width:520px">
        <div class="modal-header">
          <h2>Upload de modelo</h2>
          <button class="modal-close" id="btn-fechar-upload-ct">✕</button>
        </div>
        <div class="modal-body" id="modal-upload-ct-body">
          <div class="form-group">
            <label class="form-label">Tipo de contrato *</label>
            <select id="up-ct-tipo" class="form-select">
              <option value="">Selecione...</option>
              <option value="arrendamento">Arrendamento Rural</option>
              <option value="compra_venda">Compra e Venda</option>
              <option value="comodato">Comodato</option>
              <option value="permuta">Permuta</option>
              <option value="aluguel">Aluguel / Locação</option>
              <option value="recibo">Recibo</option>
              <option value="nota_promissoria">Nota Promissória</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Nome do modelo *</label>
            <input type="text" id="up-ct-nome" class="form-input" placeholder="Ex: Arrendamento — Modelo padrão">
          </div>
          <div class="form-group">
            <label class="form-label">Arquivo .docx *</label>
            <input type="file" id="up-ct-arquivo" class="form-input" accept=".docx">
          </div>
          <div id="up-ct-tags" style="display:none;margin-top:8px"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="btn-cancelar-upload-ct">Cancelar</button>
          <button class="btn btn-primary" id="btn-enviar-upload-ct">Enviar e validar →</button>
        </div>
      </div>
    </div>


  </div>
</main>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/pages/contratos.js"></script>
</body>
</html>
