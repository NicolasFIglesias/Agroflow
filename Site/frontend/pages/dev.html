<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
  <title>Dev Panel — AgriFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/dev.css">
</head>
<body>

<!-- ── Tela de login ──────────────────────────────────────── -->
<div id="dev-login-screen">
  <div class="dev-login-box">
    <div class="dev-login-logo">🛠️</div>
    <div class="dev-login-title">AgriFlow <span>Dev Panel</span></div>
    <div class="dev-login-sub">Acesso restrito ao desenvolvedor</div>
    <div class="dev-error" id="dev-login-error"></div>
    <div class="dev-field">
      <label>Email</label>
      <input type="email" id="dev-email" placeholder="dev@gmail.com" autocomplete="off">
    </div>
    <div class="dev-field">
      <label>Senha</label>
      <input type="password" id="dev-senha" placeholder="••••••••">
    </div>
    <button id="btn-dev-login" class="dev-btn-primary">
      <span id="dev-login-spin" class="dev-spin" style="display:none"></span>
      <span id="dev-login-text">Entrar</span>
    </button>
  </div>
</div>

<!-- ── Painel principal ────────────────────────────────────── -->
<div id="dev-panel" style="display:none">

  <!-- Topbar -->
  <div class="dev-topbar">
    <div class="dev-topbar-left">
      <span class="dev-badge">SUPERDEV</span>
      <span class="dev-topbar-title">AgriFlow Dev Panel</span>
    </div>
    <div class="dev-topbar-right">
      <div class="dev-totais" id="dev-totais"></div>
      <button id="btn-dev-logout" class="dev-btn-ghost">Sair</button>
    </div>
  </div>

  <!-- Conteúdo -->
  <div class="dev-body">

    <!-- Sidebar empresas -->
    <div class="dev-sidebar">
      <div class="dev-sidebar-title">Empresas</div>
      <div id="dev-empresas-lista"></div>
    </div>

    <!-- Painel direito -->
    <div class="dev-main" id="dev-main">
      <div class="dev-empty-state">
        <div style="font-size:3rem;margin-bottom:16px">👈</div>
        <div>Selecione uma empresa para ver os detalhes</div>
      </div>
    </div>

  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/pages/dev.js"></script>
</body>
</html>
