  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebar-avatar">?</div>

    </div>

<main class="app-main">
  <div class="app-content">

    <div class="imo-header">
      <div>
        <h1>Imóveis Rurais</h1>
        <p>Fazendas, sítios e propriedades cadastradas</p>
      </div>
      <button class="btn btn-primary btn-lg" id="btn-novo-imovel">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19" stroke-width="2" stroke-linecap="round"/>
          <line x1="5" y1="12" x2="19" y2="12" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Novo imóvel
      </button>
    </div>

    <!-- Filtros -->
    <div class="imo-filtros">
      <div class="cli-busca">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="cli-busca-icon">
          <circle cx="11" cy="11" r="8" stroke-width="2"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="imo-busca-input" class="cli-busca-input" placeholder="Buscar por denominação, município, matrícula...">
      </div>
      <select id="imo-filtro-tipo" class="cli-filtro-select">
        <option value="">Todos os tipos</option>
        <option value="fazenda">Fazenda</option>
        <option value="sitio">Sítio</option>
        <option value="chacara">Chácara</option>
        <option value="gleba">Gleba</option>
        <option value="lote_rural">Lote Rural</option>
        <option value="outro">Outro</option>
      </select>
    </div>

    <!-- Lista -->
    <div class="cli-lista-wrap">
      <div class="imo-lista-header">
        <span>Denominação</span>
        <span>Município / UF</span>
        <span>Área (ha)</span>
        <span>CAR</span>
        <span>CCIR</span>
        <span>Proprietários</span>
        <span></span>
      </div>
      <div id="imo-lista" class="cli-lista">
        <div class="cli-loading">Carregando...</div>
      </div>
    </div>

    <div class="cli-paginacao" id="imo-paginacao" style="display:none">
      <button class="btn btn-secondary btn-sm" id="btn-imo-anterior">← Anterior</button>
      <span id="imo-pag-info" class="cli-pag-info"></span>
      <button class="btn btn-secondary btn-sm" id="btn-imo-proxima">Próxima →</button>
    </div>

  </div>
</main>

<!-- Modal imóvel (simplificado — dados completos na ficha) -->
<div class="modal-overlay" id="modal-imovel" style="display:none">
  <div class="modal-box modal-lg">
    <div class="modal-header">
      <h2 id="modal-imovel-titulo">Novo Imóvel</h2>
      <button class="modal-close" id="btn-fechar-modal-imovel">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-group form-group-span2">
          <label class="form-label">Denominação *</label>
          <input type="text" id="imovel-denominacao" class="form-input" placeholder="Ex: Fazenda Boa Vista">
        </div>
        <div class="form-group">
          <label class="form-label">Município *</label>
          <input type="text" id="imovel-municipio" class="form-input" placeholder="Cidade">
        </div>
        <div class="form-group">
          <label class="form-label">UF *</label>
          <select id="imovel-uf" class="form-select">
            <option value="">—</option>
            <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
            <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
            <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
            <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
            <option>SP</option><option>SE</option><option>TO</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Área total (ha) *</label>
          <input type="number" id="imovel-area" class="form-input" placeholder="0.0000" step="0.0001" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Tipo de imóvel</label>
          <select id="imovel-tipo" class="form-select">
            <option value="">—</option>
            <option value="fazenda">Fazenda</option>
            <option value="sitio">Sítio</option>
            <option value="chacara">Chácara</option>
            <option value="gleba">Gleba</option>
            <option value="lote_rural">Lote Rural</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Matrícula</label>
          <input type="text" id="imovel-matricula" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Nº CCIR</label>
          <input type="text" id="imovel-numero-ccir" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Situação CCIR</label>
          <select id="imovel-situacao-ccir" class="form-select">
            <option value="">—</option>
            <option value="em_dia">Em dia</option>
            <option value="vencido">Vencido</option>
            <option value="em_renovacao">Em renovação</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Vencimento CCIR</label>
          <input type="date" id="imovel-vencimento-ccir" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Inscrição CAR</label>
          <input type="text" id="imovel-inscricao-car" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Situação CAR</label>
          <select id="imovel-situacao-car" class="form-select">
            <option value="">—</option>
            <option value="ativo">Ativo</option>
            <option value="pendente_analise">Pendente de análise</option>
            <option value="cancelado">Cancelado</option>
            <option value="suspenso">Suspenso</option>
          </select>
        </div>
        <div class="form-group form-group-span2">
          <label class="form-label">Localização / Descrição</label>
          <input type="text" id="imovel-localizacao" class="form-input" placeholder="Referências de localização">
        </div>
        <div class="form-group">
          <label class="form-label">Bioma</label>
          <select id="imovel-bioma" class="form-select">
            <option value="">—</option>
            <option value="amazonia">Amazônia</option>
            <option value="cerrado">Cerrado</option>
            <option value="pantanal">Pantanal</option>
            <option value="mata_atlantica">Mata Atlântica</option>
            <option value="caatinga">Caatinga</option>
            <option value="pampa">Pampa</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Atividade principal</label>
          <select id="imovel-atividade" class="form-select">
            <option value="">—</option>
            <option value="agricultura">Agricultura</option>
            <option value="pecuaria">Pecuária</option>
            <option value="mista">Mista</option>
            <option value="reflorestamento">Reflorestamento</option>
            <option value="outro">Outro</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-cancelar-imovel">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-imovel">Salvar imóvel</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/pages/imoveis.js"></script>
</body>
</html>
