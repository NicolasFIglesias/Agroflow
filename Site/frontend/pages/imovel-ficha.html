<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
  <title>Ficha do Imóvel — AgriFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components/sidebar.css">
  <link rel="stylesheet" href="../css/cliente-ficha.css">
  <link rel="stylesheet" href="../css/imovel-ficha.css">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🌿</div>
    <div>
      <div class="sidebar-logo-text">AgriFlow</div>
      <div class="sidebar-logo-sub">Crédito Rural</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Principal</div>
    <a href="/pages/visao-geral.html" class="sidebar-item sidebar-item-admin" data-page="visao-geral" style="display:none">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/>
        <rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/>
        <rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/>
        <rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/>
      </svg>
      Visão Geral
    </a>
    <a href="/pages/clientes.html" class="sidebar-item" data-page="clientes">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/>
        <circle cx="9" cy="7" r="4" stroke-width="2"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Clientes
    </a>
    <a href="/pages/imoveis.html" class="sidebar-item active" data-page="imoveis">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M3 9.5L12 4l9 5.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 21V12h6v9" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Imóveis
    </a>
    <a href="/pages/calendario.html" class="sidebar-item" data-page="calendario">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/>
        <line x1="16" y1="2" x2="16" y2="6" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="2" x2="8" y2="6" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="10" x2="21" y2="10" stroke-width="2"/>
      </svg>
      Calendário
    </a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label sidebar-item-admin" style="display:none">Administração</div>
    <a href="/pages/colaboradores.html" class="sidebar-item sidebar-item-admin" data-page="colaboradores" style="display:none">
      <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/>
        <circle cx="9" cy="7" r="4" stroke-width="2"/>
        <line x1="19" y1="8" x2="19" y2="14" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="11" x2="16" y2="11" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Colaboradores
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebar-avatar">?</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name" id="sidebar-user-name">—</div>
      <div class="sidebar-user-role" id="sidebar-user-role">—</div>
    </div>
  </div>
  <button class="sidebar-logout-btn" id="btn-logout">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M17 16l4-4m0 0l-4-4m4 4H7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3 12V5a2 2 0 012-2h7" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Sair da conta
  </button>
</aside>

<main class="app-main">
  <div class="app-content">

    <div class="cf-breadcrumb">
      <a href="/pages/imoveis.html">← Imóveis</a>
      <span id="cf-breadcrumb-nome">Carregando...</span>
    </div>

    <!-- Hero -->
    <div class="cf-hero" id="cf-hero">
      <div class="cf-hero-avatar" id="cf-hero-avatar" style="background:linear-gradient(135deg,#D1FAE5,#059669);font-size:1.6rem">🏡</div>
      <div class="cf-hero-info">
        <h1 id="cf-nome">—</h1>
        <div class="cf-hero-meta" id="cf-hero-meta"></div>
      </div>
      <div class="cf-hero-actions">
        <button class="btn btn-secondary" id="btn-editar-imovel">Editar dados</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="cf-tabs">
      <button class="cf-tab active" data-tab="dados">Dados do Imóvel</button>
      <button class="cf-tab" data-tab="documentos">Registros / Docs</button>
      <button class="cf-tab" data-tab="proprietarios">Proprietários</button>
      <button class="cf-tab" data-tab="mapa">Mapa</button>
    </div>

    <!-- TAB: DADOS -->
    <div class="cf-panel active" id="panel-dados">
      <div class="cf-section-grid" id="dados-grid">
        <div class="cli-loading">Carregando...</div>
      </div>
    </div>

    <!-- TAB: DOCUMENTOS / REGISTROS -->
    <div class="cf-panel" id="panel-documentos">
      <div class="cf-section-grid" id="docs-grid">
        <div class="cli-loading">Carregando...</div>
      </div>
    </div>

    <!-- TAB: PROPRIETÁRIOS -->
    <div class="cf-panel" id="panel-proprietarios">
      <div class="cf-panel-header">
        <h3>Proprietários / Vínculos</h3>
        <button class="btn btn-secondary btn-sm" id="btn-add-proprietario">+ Vincular cliente</button>
      </div>
      <div id="proprietarios-lista"></div>
    </div>

    <!-- TAB: MAPA -->
    <div class="cf-panel" id="panel-mapa">
      <div id="mapa-container" class="imf-mapa-container">
        <div id="imf-mapa"></div>
        <div class="imf-mapa-coords" id="imf-mapa-coords" style="display:none">
          <span id="imf-coords-text"></span>
          <a id="imf-gmaps-link" href="#" target="_blank" rel="noopener" class="btn btn-secondary btn-sm">Abrir no Google Maps</a>
        </div>
        <div id="imf-mapa-sem-coords" class="imf-mapa-empty">
          <p>Coordenadas não informadas para este imóvel.</p>
          <button class="btn btn-secondary btn-sm" id="btn-editar-coords">Adicionar coordenadas</button>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- Modal vincular proprietário -->
<div class="modal-overlay" id="modal-add-prop" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Vincular Cliente como Proprietário</h2>
      <button class="modal-close" id="btn-fechar-modal-prop">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Buscar cliente</label>
        <input type="text" id="prop-busca" class="form-input" placeholder="Digite o nome do cliente...">
      </div>
      <div id="prop-resultados" class="cf-vincular-resultados"></div>
      <div class="form-grid-2" style="margin-top:16px">
        <div class="form-group">
          <label class="form-label">Tipo de vínculo</label>
          <select id="prop-tipo" class="form-select">
            <option value="proprietario">Proprietário</option>
            <option value="posseiro">Posseiro</option>
            <option value="arrendatario">Arrendatário</option>
            <option value="comodatario">Comodatário</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">% de participação</label>
          <input type="number" id="prop-percentual" class="form-input" value="100" min="0" max="100">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-cancelar-prop">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-prop" disabled>Vincular</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/pages/imovel-ficha.js"></script>
</body>
</html>
