<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
  <title>Serviços — AgriFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components/sidebar.css">
  <link rel="stylesheet" href="../css/vendas.css">
</head>
<body>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🌿</div>
    <div><div class="sidebar-logo-text">AgriFlow</div><div class="sidebar-logo-sub">Crédito Rural</div></div>
  </div>
  <nav class="sidebar-nav"></nav>
  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebar-avatar">?</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name" id="sidebar-user-name">—</div>
      <div class="sidebar-user-role" id="sidebar-user-role">—</div>
    </div>
  </div>
  <button class="sidebar-logout-btn" id="btn-logout">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 12V5a2 2 0 012-2h7" stroke-width="2" stroke-linecap="round"/></svg>
    Sair da conta
  </button>
</aside>

<main class="app-main">
  <div class="app-content" style="max-width:720px">

    <div class="vnd-header">
      <div>
        <h1>🛒 Serviços e Produtos</h1>
        <p>Catálogo de serviços e produtos oferecidos pela empresa</p>
      </div>
      <button class="btn btn-primary btn-lg" id="btn-novo-servico">+ Novo serviço</button>
    </div>

    <div id="srv-lista" style="display:flex;flex-direction:column;gap:10px">
      <div class="vnd-empty">Carregando...</div>
    </div>

  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-servico">
  <div class="modal-box" style="max-width:460px">
    <div class="modal-header">
      <h2 id="modal-srv-titulo">Novo serviço</h2>
      <button class="modal-close" id="btn-fechar-srv">✕</button>
    </div>
    <div class="modal-body" style="gap:12px">
      <input type="hidden" id="srv-id">
      <div class="form-group">
        <label class="form-label">Nome do serviço / produto *</label>
        <input type="text" id="srv-nome" class="form-input" placeholder="Ex: Georreferenciamento, Consultoria, Arrendamento...">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Preço de custo (R$)</label>
          <input type="number" id="srv-custo" class="form-input" step="0.01" min="0" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Preço de venda (R$) *</label>
          <input type="number" id="srv-venda" class="form-input" step="0.01" min="0" placeholder="0,00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea id="srv-desc" class="form-input" rows="2" placeholder="Descrição opcional..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-cancelar-srv">Cancelar</button>
      <button class="btn btn-primary"   id="btn-salvar-srv">Salvar</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/pages/servicos.js"></script>
</body>
</html>
